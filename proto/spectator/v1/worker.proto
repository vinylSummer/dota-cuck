syntax = "proto3";
package spectator.v1;

option go_package = "github.com/vinylSummer/dota-cuck/gen/spectator/v1";

// === Service ===

service ControlPlaneService {
  // Worker opens this on startup. Control plane pushes Commands; worker pushes Events.
  rpc WorkerSession(stream WorkerEvent) returns (stream Command);
}

// === Events: Worker → Control Plane ===

message WorkerEvent {
  string worker_id = 1;
  oneof payload {
    WorkerReady        ready             = 2;
    StatusUpdate       status_update     = 3;
    SteamGuardRequired steam_guard       = 4;
    MatchIdResolved    match_id_resolved = 5;
    StreamStarted      stream_started    = 6;
    ErrorEvent         error             = 7;
    FriendsResult      friends_result    = 8;
    LinkResult         link_result       = 9;
  }
}

message WorkerReady        {}
message StatusUpdate       { WorkerState state = 1; }
// request_id correlates the prompt with the LinkAccount/ListFriends/StartSpectate
// login that raised it; empty for a session-driven (spectate) login in V1.
message SteamGuardRequired { SteamGuardType guard_type = 1; string request_id = 2; }
message MatchIdResolved    { uint64 match_id = 1; string steam_id = 2; }
message StreamStarted      { string srt_url = 1; }
message ErrorEvent         { string code = 1; string message = 2; bool fatal = 3; }

// Reply to a ListFriends command, correlated by request_id. On failure `error`
// is set and `friends` is empty. owner_steam_id is the logged-in account's own
// Steam ID, used to backfill steam_accounts.steam_id.
message FriendsResult {
  string          request_id     = 1;
  repeated Friend friends        = 2;
  string          owner_steam_id = 3;
  ErrorEvent      error          = 4;
}

message Friend {
  string steam_id     = 1;
  string persona_name = 2;
  bool   online       = 3;
  bool   in_match     = 4;   // currently in a Dota 2 game
}

// Reply to a LinkAccount command, correlated by request_id. On success
// owner_steam_id holds the logged-in account's own Steam ID (used to backfill
// steam_accounts.steam_id); on failure `error` is set.
message LinkResult {
  string     request_id     = 1;
  string     owner_steam_id = 2;
  ErrorEvent error          = 3;
}

// === Commands: Control Plane → Worker ===

message Command {
  oneof payload {
    StartSpectate        start_spectate  = 1;
    StopSpectate         stop_spectate   = 2;
    SubmitSteamGuardCode steam_guard     = 3;
    ListFriends          list_friends    = 4;
    LinkAccount          link_account    = 5;
  }
}

// Standalone login to establish the worker's Steam Guard device trust (sentry)
// and report the account's own Steam ID. Drives the interactive Steam Guard
// flow at account-link time; the worker persists only the sentry, never the
// login_key. Replies with LinkResult correlated by request_id.
message LinkAccount {
  string request_id     = 1;
  string steam_username = 2;        // credentials decrypted in memory by control plane
  string steam_password = 3;
}

message StartSpectate {
  string session_id      = 1;
  string target_steam_id = 2;       // friend's Steam ID to spectate
  string steam_username   = 3;      // credentials decrypted in memory by control plane
  string steam_password   = 4;
  bytes  sentry_hash      = 5;      // device trust token if available; empty on first login
}

// On-demand friends fetch. The worker logs in (relogin via login_key when
// available, else credentials), lists friends, and replies with FriendsResult.
message ListFriends {
  string request_id     = 1;        // correlates the FriendsResult reply
  string steam_username  = 2;       // credentials decrypted in memory by control plane
  string steam_password  = 3;
  bytes  sentry_hash     = 4;       // device trust token if available
}

message StopSpectate         {}
// request_id correlates with the SteamGuardRequired prompt; empty for a
// session-driven (spectate) login in V1.
message SubmitSteamGuardCode { string code = 1; string request_id = 2; }

// === Enums ===

enum WorkerState {
  WORKER_STATE_UNSPECIFIED = 0;
  STOPPED    = 1;
  STARTING   = 2;
  IDLE       = 3;
  SPECTATING = 4;
  STOPPING   = 5;
}

enum SteamGuardType {
  STEAM_GUARD_TYPE_UNSPECIFIED = 0;
  EMAIL  = 1;
  MOBILE = 2;
}
