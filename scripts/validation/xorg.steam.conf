# Headless NVIDIA Xorg for the Steam desktop that reports a FAKE connected display.
#
# Without a connected monitor, steamwebhelper fails with "CreateOutputWindow: Could not find
# display info" and never renders its UI. ConnectedMonitor + a Modeline + EDID-less
# ModeValidation makes the NVIDIA driver expose a display (RANDR reports HDMI-0 connected),
# which satisfies Steam's window creation. BusID is wolf-den's RTX 3090 (host 0b:00.0 -> PCI:11:0:0).
Section "ServerLayout"
    Identifier "layout"
    Screen 0 "nvidia-screen"
EndSection

Section "Monitor"
    Identifier "Monitor0"
    HorizSync   28.0-80.0
    VertRefresh 48.0-75.0
    # 1280x720@60 CVT modeline
    Modeline "1280x720" 74.48 1280 1336 1472 1664 720 721 724 746 -HSync +Vsync
    Option "DPMS"
EndSection

Section "Device"
    Identifier  "nvidia-device"
    Driver      "nvidia"
    BusID       "PCI:11:0:0"
    Option      "ConnectedMonitor" "DFP-0"
    Option      "ModeValidation" "NoMaxPClkCheck,NoEdidMaxPClkCheck,NoMaxSizeCheck,NoHorizSyncCheck,NoVertRefreshCheck,NoVirtualSizeCheck,NoDualLinkDVICheck,NoDisplayPortBandwidthCheck,AllowNonEdidModes,NoEdidHDMI2Check,AllowNon3DVisionModes"
    Option      "AllowEmptyInitialConfiguration" "true"
EndSection

Section "Screen"
    Identifier "nvidia-screen"
    Device     "nvidia-device"
    Monitor    "Monitor0"
    DefaultDepth 24
    Option     "UseDisplayDevice" "DFP-0"
    SubSection "Display"
        Depth   24
        Modes   "1280x720"
        Virtual 1280 720
    EndSubSection
EndSection
