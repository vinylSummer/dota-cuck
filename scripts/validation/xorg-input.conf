# Force-bind our virtual uinput devices to the libinput driver. We create three, all named with
# a "dota-" prefix:
#   dota-spectate-uinput  — scripted console keyboard (uinput_daemon.py, FIFO-driven)
#   dota-vnc-kbd          — VNC keyboard bridge (vnc_input_daemon.py)
#   dota-vnc-mouse        — VNC absolute pointer bridge (vnc_input_daemon.py)
# dumb-udev mis-tags these virtual devices (e.g. ID_INPUT_JOYSTICK), so a generic MatchIsKeyboard
# / MatchIsPointer catch-all would not match them. MatchProduct does a SUBSTRING match, so a
# single "dota-" rule forcing Driver "libinput" binds all three; libinput then reads the real
# evdev bits and creates a keyboard / pointer, so Source 2 (which ignores XTEST) receives genuine
# driver-originated X input events. setup_uinput() additionally rewrites the udev ID_INPUT_* tag
# per device (KEYBOARD vs MOUSE) so libinput classifies each correctly.
Section "InputClass"
    Identifier   "dota-uinput"
    MatchProduct "dota-"
    Driver       "libinput"
EndSection
