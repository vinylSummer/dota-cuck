name: Tests + linting

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: control-plane/go.mod
          cache-dependency-path: control-plane/go.sum
      - name: go vet
        working-directory: control-plane
        run: go vet ./...
      - name: gofmt
        working-directory: control-plane
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

  lint-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - name: ruff check
        run: uvx ruff check worker/ --exclude worker/gen
      - name: ruff format
        run: uvx ruff format --check worker/ --exclude worker/gen

  test-go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: control-plane/go.mod
          cache-dependency-path: control-plane/go.sum
      - name: Run Go tests
        working-directory: control-plane
        run: go test ./...
        env:
          POSTGRESQL_URL: postgres://postgres:postgres@localhost:5432/postgres

  test-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - name: Run Python tests
        working-directory: worker
        run: uv run pytest -q

  test-fe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
