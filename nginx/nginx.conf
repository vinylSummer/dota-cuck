# Host nginx site for dota.example.com (NOT in compose — runs on the host so
# certbot manages TLS). Drop into /etc/nginx/sites-available and symlink, or
# include from the main http{} block. Proxies to the compose services bound on
# localhost (see docker-compose.yml) and serves the static React build.
#
#   /api/*    -> control plane HTTP        127.0.0.1:42000
#   /ws       -> control plane WebSocket   127.0.0.1:42000 (same server)
#   /webrtc/* -> mediamtx WHEP             127.0.0.1:8889
#   /         -> static SPA (vite build)   /usr/share/nginx/html
#
# Run `certbot --nginx -d dota.example.com` to fill in the ssl_certificate lines
# and the :80 -> :443 redirect.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dota.example.com;

    # certbot fills these in:
    # ssl_certificate     /etc/letsencrypt/live/dota.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dota.example.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # REST API.
    location /api/ {
        proxy_pass http://127.0.0.1:42000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket push stream (server -> client events). Same upstream as /api.
    location /ws {
        proxy_pass http://127.0.0.1:42000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 1h; # the WS is long-lived; don't reap it
    }

    # WebRTC/WHEP egress. Stripping /webrtc/ maps /webrtc/live/match -> mediamtx
    # /live/match (the WHEP handshake POSTs to .../whep under it).
    location /webrtc/ {
        proxy_pass http://127.0.0.1:8889/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static SPA: serve files, falling back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Redirect plain HTTP to HTTPS (certbot usually manages this block).
server {
    listen 80;
    listen [::]:80;
    server_name dota.example.com;
    return 301 https://$host$request_uri;
}
