# Headless Xorg config for the worker — NVIDIA RTX 3090, no physical display.
#
# BusID is the PCI address of the GPU in Xorg's "PCI:bus:dev:func" form (decimal).
# Host PCI address 0b:00.0 (hex) → bus 11, dev 0, func 0 → "PCI:11:0:0".
# Confirm on a new machine with: nvidia-smi --query-gpu=pci.bus_id --format=csv
# (or `lspci | grep -i nvidia`) and convert the hex bus to decimal.
#
# AllowEmptyInitialConfiguration + a Virtual screen lets Xorg start on :99 with no
# monitor attached (x11grab then captures the virtual framebuffer). nvidia_drv.so and
# the GLX libs are injected into the container by the NVIDIA Container Toolkit when the
# graphics/display driver capabilities are enabled — do not install a driver package in
# the image (it would mismatch the host driver).

Section "ServerLayout"
    Identifier "layout"
    Screen 0 "nvidia-screen"
EndSection

Section "Device"
    Identifier  "nvidia-device"
    Driver      "nvidia"
    BusID       "PCI:11:0:0"
EndSection

Section "Screen"
    Identifier "nvidia-screen"
    Device     "nvidia-device"
    Option     "AllowEmptyInitialConfiguration" "true"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Virtual 1280 720
    EndSubSection
EndSection
