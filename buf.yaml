version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  # The wire contract is fixed by CLAUDE.md (unprefixed enum values, bidi
  # stream request/response names). Relax the buf naming rules that would
  # otherwise reject that contract verbatim.
  except:
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
